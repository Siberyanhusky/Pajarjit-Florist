<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Produk - PAJARJIT FLORIST</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BACKGROUND PREMIUM */
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #ffffff, #f6f6f6);
  background-image: url('https://www.transparenttextures.com/patterns/white-wall.png');
  color: #111;
}

/* NAV */
nav {
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
}

nav a {
  text-decoration: none;
  color: #111;
  margin-left: 20px;
  font-size: 14px;
}

.logo {
  font-family: 'Playfair Display';
}

/* HEADER */
.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  font-family: 'Playfair Display';
  font-size: 36px;
}

/* FILTER */
.filter {
  text-align: center;
  margin-bottom: 40px;
}

.filter button {
  padding: 10px 18px;
  margin: 5px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  border-radius: 20px;
}

.filter button:hover {
  background: black;
  color: white;
}

/* PRODUCTS */
.products {
  padding: 0 60px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
}

.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.price {
  color: #777;
  margin-top: 5px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
}

</style>
</head>

<body>

<nav>
  <div class="logo">PAJARJIT FLORIST</div>
  <div>
    <a href="index.html">Home</a>
    <a href="produk.html">Produk</a>
    <a href="kontak.html">Kontak</a>
  </div>
</nav>

<div class="header">
  <h1>Our Collection</h1>
</div>

<div class="filter">
  <button onclick="filterProduct('all')">All</button>
  <button onclick="filterProduct('wisuda')">Wisuda</button>
  <button onclick="filterProduct('romantic')">Romantic</button>
  <button onclick="filterProduct('special')">Special</button>
</div>

<div class="products">

  <div class="card wisuda">
    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    <div class="card-content">
      <h3>Bouquet Wisuda Elegant</h3>
      <p class="price">Rp150.000</p>
      <a class="btn" href="detail.html">Lihat Detail</a>
    </div>
  </div>

  <div class="card romantic">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <div class="card-content">
      <h3>Bouquet Mawar Premium</h3>
      <p class="price">Rp200.000</p>
      <a class="btn" href="detail.html">Lihat Detail</a>
    </div>
  </div>

  <div class="card special">
    <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
    <div class="card-content">
      <h3>Bouquet Soft Pink</h3>
      <p class="price">Rp175.000</p>
      <a class="btn" href="detail.html">Lihat Detail</a>
    </div>
  </div>

  <div class="card romantic">
    <img src="https://images.unsplash.com/photo-1518895949257-7621c3c786d7">
    <div class="card-content">
      <h3>Bouquet Romantic Red</h3>
      <p class="price">Rp220.000</p>
      <a class="btn" href="detail.html">Lihat Detail</a>
    </div>
  </div>

</div>

<footer>
  © 2026 PAJARJIT FLORIST
</footer>

<script>
function filterProduct(category){
  let cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    if(category === 'all'){
      card.style.display = 'block';
    } else {
      if(card.classList.contains(category)){
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    }
  });
}
</script>

</body>
</html>
